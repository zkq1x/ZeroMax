name: desktop

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "zeromax-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "zeromax-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: ZeroMax-macos
            artifact-path: target/release/ZeroMax
          - os: ubuntu-latest
            artifact-name: ZeroMax-linux
            artifact-path: target/release/ZeroMax
          - os: windows-latest
            artifact-name: ZeroMax-windows
            artifact-path: target/release/ZeroMax.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: desktop-${{ matrix.os }}

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev \
            libgl1-mesa-dev \
            libssl-dev

      - name: Build (release)
        run: cargo build -p zeromax-desktop --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
